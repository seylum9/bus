.trip-meta{font-size:12px;color:#475569;margin-top:2px}

<div class="app">
  <div class="header">
    <i class="ti ti-bus" aria-hidden="true" style="font-size:20px;color:var(--text-accent)"></i>
    <h1 id="header-title">安謝橋 時刻表 →那覇BT方面</h1>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab active" onclick="switchTab('timetable',this)">時刻表</button>
    <button class="tab" onclick="switchTab('approach',this)">接近情報</button>
  </div>

  <div id="timetable" class="section active">
    <div class="now-bar">
      <span class="now-time" id="now-time">--:--</span>
      <span class="next-info" id="next-info">…</span>
    </div>

    <div class="control-panel" id="control-panel">
    <div class="direction-row" id="direction-row">
      <button class="direction-btn active" onclick="setDirection('inbound',this)">那覇BT方面</button>
      <button class="direction-btn" onclick="setDirection('outbound',this)">安謝橋方面</button>
    </div>

    <!-- バス停選択 -->
    <div class="stop-row" id="stop-row"></div>

    <!-- 平日/土曜/日祝 -->
    <div class="day-row">
      <button class="day-btn" id="d1" onclick="setDay(1,this)">平日</button>
      <button class="day-btn" id="d3" onclick="setDay(3,this)">土曜</button>
      <button class="day-btn" id="d4" onclick="setDay(4,this)">日祝</button>
    </div>

    <div class="selection-strip" id="selection-strip"></div>

    <!-- カバレッジ注記 -->
    <div class="coverage-note" id="coverage-note"></div>
    <div class="service-summary" id="service-summary"></div>

    <!-- 路線フィルター -->
    <div class="filter-row" id="filter-row"></div>
    </div>

    <div id="grid"></div>
    <div class="data-footer" id="data-footer"></div>
    <div class="quick-actions" id="quick-actions">
      <button type="button" class="quick-action" onclick="scrollToControls()">条件変更</button>
      <button type="button" class="quick-action primary" onclick="scrollToNextBus()">次の便</button>
    </div>
    <div class="trip-overlay" id="trip-overlay" hidden onclick="closeTrip(event)">
      <div class="trip-detail" id="trip-detail" onclick="event.stopPropagation()"></div>
    </div>
  </div>

  <div id="approach" class="section">
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">タップするとバスなび沖縄の接近情報へ移動します。</p>
    <div id="approach-list"></div>
  </div>
</div>

function dayKey(){
  return currentDay===1?'wd':currentDay===3?'sat':'sun';
}
function directionConfig(){
  return DIRECTIONAL_GTFS[currentDirection];
}
function getStopData(stop, key) {
  const d = directionConfig().data[stop]?.[key] || [];
  return d.map(([r,t,via,trip]) => ({r,t,via:via||'',trip:trip||''}));
}
function switchTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

function t2m(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function getNow(){const d=new Date();return d.getHours()*60+d.getMinutes();}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function todayDayNumber(){
  const dow=new Date().getDay();
  return dow===0?4:dow===6?3:1;
}
function isSelectedDayToday(){
  return currentDay===todayDayNumber();
}
function selectedDayInfo(){
  if(currentDay===3) return {label:'土曜', cls:'sat'};
  if(currentDay===4) return {label:'日祝', cls:'sun'};
  return {label:'平日', cls:'wd'};
}
function updateSelectionStrip(){
  const day=selectedDayInfo();
  document.getElementById('selection-strip').innerHTML =
    `<span class="selection-label">選択中</span>`+
    `<span class="selection-chip">${esc(directionConfig().label)}</span>`+
    `<span class="selection-chip ${day.cls}">${day.label}</span>`+
    `<span class="selection-chip">${esc(currentStop)}</span>`;
}

  if(!pendingAutoScroll) return;
  pendingAutoScroll=false;
  if(currentTripId) return;
  requestAnimationFrame(()=>{
    const target=relevantTimeTarget();
    if(target) target.scrollIntoView({block:'center', behavior:'smooth'});
  });
}

function scrollToControls(){
  pendingAutoScroll=false;
  document.getElementById('control-panel')?.scrollIntoView({block:'start', behavior:'smooth'});
}

function scrollToNextBus(){
  pendingAutoScroll=false;
  const target=relevantTimeTarget();
  if(target) target.scrollIntoView({block:'center', behavior:'smooth'});
}

function selectTrip(tripId){
  currentTripId = currentTripId===tripId ? '' : tripId;
  renderTimetable();
}

function closeTrip(event){
  if(event && event.target && event.target.id !== 'trip-overlay') return;
  currentTripId='';
  renderTimetable();
}

function getTripStops(tripId){
  if(!tripId) return [];
  const key=dayKey();
  const stops=directionConfig().stops;
  return stops.flatMap(stop=>{
    const hit=getStopData(stop,key).find(x=>x.trip===tripId);
    return hit ? [{stop,...hit}] : [];
  });
}

function renderTripDetail(){
  const overlay=document.getElementById('trip-overlay');
  const detail=document.getElementById('trip-detail');
  const stops=getTripStops(currentTripId);
  if(!stops.length){
    overlay.hidden=true;
    detail.innerHTML='';
    return;
  }
  const current=stops.find(x=>x.stop===currentStop) || stops[0];
  const via=current.via?`${esc(current.via)}経由`:'経由情報なし';
  overlay.hidden=false;
  detail.innerHTML=
    `<div class="trip-head">`+
      `<div><div class="trip-title">${esc(current.r)}番 ${esc(current.t)} ${via}</div>`+
      `<div class="trip-meta">${esc(directionConfig().label)} / ${esc(currentStop)}発</div></div>`+
      `<button type="button" class="trip-close" onclick="closeTrip()" aria-label="閉じる">&times;</button>`+
    `</div>`+
    `<div class="trip-stops">`+
      stops.map(x=>`<div class="trip-stop${x.stop===currentStop?' active':''}">`+
        `<span class="trip-time">${esc(x.t)}</span><span>${esc(x.stop)}</span>`+
      `</div>`).join('')+
    `</div>`;
}

function renderFilters(){
  const data = getStopData(currentStop, dayKey());
  const routes = [...new Set(data.map(x=>x.r))].sort((a,b)=>Number(a)-Number(b));
  const fr = document.getElementById('filter-row');
  fr.innerHTML = '<button class="filter-btn active" onclick="setFilter(\'all\',this)">全路線</button>' +
    routes.map(r=>`<button class="filter-btn" onclick="setFilter('${r}',this)">${r}</button>`).join('');
}

function renderTimetable(){
  const now = getNow();
  const useLiveTime = isSelectedDayToday();
  const baseData = getStopData(currentStop, dayKey());
  let data = baseData.slice();
  if(currentFilter !== 'all') data = data.filter(x=>x.r===currentFilter);
  data.sort((a,b)=>t2m(a.t)-t2m(b.t));

  const nxt = useLiveTime ? data.find(x=>t2m(x.t)>=now) : null;
  const hh=String(Math.floor(now/60)).padStart(2,'0');
  const mm=String(now%60).padStart(2,'0');
  document.getElementById('now-time').textContent=hh+':'+mm;
  if(nxt){
    const diff=t2m(nxt.t)-now;
    const via=nxt.via?` ${nxt.via}経由`:'';
    document.getElementById('next-info').textContent=`次: ${nxt.t} (${nxt.r}番${via}) あと${diff}分`;
  } else if(!useLiveTime){
    document.getElementById('next-info').textContent='';
  } else {
    document.getElementById('next-info').textContent='本日の運行は終了';
  }

  updateSelectionStrip();
  updateDataFooter();
  document.getElementById('coverage-note').textContent='定期内路線のみ表示。31番は対象外。';
  const routes = [...new Set(baseData.map(x=>x.r))].sort((a,b)=>Number(a)-Number(b));
  const vias = [...new Set(baseData.map(x=>x.via).filter(Boolean))];
  document.getElementById('service-summary').innerHTML =
    `<div class="service-metric"><span class="k">便数</span><span class="v">${baseData.length}</span></div>`+
    `<div class="service-metric"><span class="k">路線</span><span class="v">${routes.length?routes.join('・'):'なし'}</span></div>`+
    `<div class="service-metric"><span class="k">経由</span><span class="v">${vias.length?vias.join('・'):'なし'}</span></div>`;

  const hmap={};
  data.forEach(x=>{
    const h=parseInt(x.t.split(':')[0]);
    if(!hmap[h])hmap[h]=[];
    hmap[h].push(x);
  });
  const hours=Object.keys(hmap).map(Number).sort((a,b)=>a-b);
  const nowH=Math.floor(now/60);
  let html='';
  hours.forEach(h=>{
    const chips=hmap[h];
    const isCur=useLiveTime&&h===nowH;
    html+=`<div class="hour-row${isCur?' current-hour':''}"><div class="hour-label">${String(h).padStart(2,'0')}</div><div class="times">`;
    chips.forEach(c=>{
      const isPast=useLiveTime&&t2m(c.t)<now;
      const isNext=nxt&&c.t===nxt.t&&c.r===nxt.r;
      const cls=(c.trip===currentTripId?'selected ': '')+(isNext?'next':isPast?'past':'');
      const via=c.via?`<span class="via">${esc(c.via)}</span>`:'';
      html+=`<button type="button" class="chip ${cls}" onclick="selectTrip('${c.trip}')"><span class="rn">${c.r}</span>${c.t.split(':')[1]}${via}</button>`;
    });
    html+='</div></div>';
  });
  if(!html)html='<p class="no-data">この日の運行はありません。</p>';
  document.getElementById('grid').innerHTML=html;
  renderTripDetail();
}

function renderApproach(){
  const el=document.getElementById('approach-list');
  el.innerHTML=Object.entries(ROUTE_NAMES).map(([num,name])=>{
    const cg=APPROACH[num];
    const url=cg?BASE_A+cg+"#mine":`http://www.busnavi-okinawa.com/mobile/Timetable/TimeAndApproach?stationSid=${SID_ANZAHASHI}&fromType=stationSearch`;
    return `<a class="route-row" href="${url}">
      <span class="badge">${num}</span>
      <div style="flex:1;min-width:0"><div class="rname">${name}</div><div class="rdest">安謝橋 発着</div></div>
      <i class="ti ti-external-link" aria-hidden="true" style="color:var(--text-muted);font-size:16px;flex-shrink:0"></i>
    </a>`;
  }).join('');
}

function initStops(){
  const row=document.getElementById('stop-row');
  row.innerHTML=directionConfig().stops.map(s=>
    `<button class="stop-btn${s===currentStop?' active':''}" onclick="setStop('${s}',this)">${s}</button>`
  ).join('');
}

function initDay(){
  const dow=new Date().getDay();
  const dayId=dow===0?'d4':dow===6?'d3':'d1';
  const dayNum=dow===0?4:dow===6?3:1;
  currentDay=dayNum;
  document.getElementById(dayId).classList.add('active');
}

initStops();
initDay();
updateHeader();
renderFilters();
renderTimetable();
renderApproach();
setInterval(()=>{if(isSelectedDayToday())renderTimetable();},30000);
</script>
